<!DOCTYPE html>
<html lang='de'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Robot Control Center</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'>
    <link rel='stylesheet' href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>ROBOT CONTROL <span>V2.1</span></h1>
        <div id='status-badge' class='badge'>System Online</div>
    </header>
    <nav class='tabs-nav'>
        <button class='tab-btn active' onclick="showTab('tab-control')">Live Control</button>
        <button class='tab-btn' onclick="showTab('tab-settings')">System Settings</button>
    </nav>
    <div id='tab-control' class='tab-content active'>
        <div class='video-container'>
            <img src="/api/camera_stream" alt="Live View">
        </div>
        <div class='dashboard-grid'>
            <section class='card'>
                <h2>🕹️ Motion Control</h2>
                <div class='joystick'>
                    <button class='btn-ctrl' style='grid-area: up' onmousedown="sendCommand('forward')" onmouseup="stopCommand()">▲</button>
                    <button class='btn-ctrl' style='grid-area: left' onmousedown="sendCommand('left')" onmouseup="stopCommand()">◀</button>
                    <button class='btn-ctrl' style='grid-area: stop' onclick="sendCommand('stop')">■</button>
                    <button class='btn-ctrl' style='grid-area: right' onmousedown="sendCommand('right')" onmouseup="stopCommand()">▶</button>
                    <button class='btn-ctrl' style='grid-area: down' onmousedown="sendCommand('backward')" onmouseup="stopCommand()">▼</button>
                </div>
            </section>
            <section class='card'>
                <h2>📊 Status & Mode</h2>
                <div class='setting-item'>
                    <label>Gangart (Gait)</label>
                    <select id="gait-select" onchange="changeGait(this.value)">
                        <option value="trot">Trab (Trot)</option>
                        <option value="walk">Schritt (Walk)</option>
                    </select>
                </div>
                <div class='setting-item'>
                    <label>Körperhaltung (Pose)</label>
                    <select id="pose-select" onchange="changePose(this.value)">
                        <option value="normal">Normal</option>
                        <option value="submissive">Unterwürfig</option>
                        <option value="sit">Sitzen</option>
                        <option value="down">Liegen</option>
                        <option value="aggressive">Aggressiv</option>
                        <option value="playful">Verspielt</option>
                    </select>
                </div>
                <div class='setting-item'>
                    <label>Intelligenz-Modus</label>
                    <select id="mode-select" onchange="changeMode(this.value)">
                        <option value="autonomous">Normal / Home</option>
                        <option value="alarm">Sicherheit / Alarm</option>
                    </select>
                </div>
                <div class='setting-item'>
                    <label>Batteriestand</label>
                    <div class='setting-row'>
                        <span id="battery-val" style="font-weight: 700; color: #10b981;">-- V</span>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <div id='tab-settings' class='tab-content'>
        <div class='dashboard-grid'>
            <section class='card'>
                <h2>⚙️ Servo Kalibrierung</h2>
                <div id='servo-list'></div>
            </section>
            <section class='card'>
                <h2>👁️ Vision & Performance</h2>
                <div class='setting-item'>
                    <label>Kamera-Stabilisierung</label>
                    <div class='setting-row'>
                        <span>Aktiv</span>
                        <input type="checkbox" id="cfg-system-camera_stabilization" onchange="updateQuickConfig('system.camera_stabilization', this.checked)">
                    </div>
                </div>
                <div class='setting-item'>
                    <label>Vision Skip Frames (CPU Save)</label>
                    <input type="range" min="1" max="10" value="2" id="cfg-system-vision_processing_skip" oninput="updateQuickConfig('system.vision_processing_skip', parseInt(this.value))">
                </div>
                <h2 style="margin-top:2rem">🌐 MQTT Konnektivität</h2>
                <div class='setting-item'>
                    <label>Broker Adresse</label>
                    <input type="text" id="cfg-mqtt-broker" placeholder="z.B. 192.168.1.10">
                </div>
                <button class='btn-save' onclick="saveAllSettings()">Einstellungen Speichern</button>
            </section>
        </div>
    </div>
    <script>
        let currentConfig = {};
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'tab-settings') loadConfig();
        }
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                currentConfig = await res.json();
                if (currentConfig.system) {
                    document.getElementById('cfg-system-camera_stabilization').checked = currentConfig.system.camera_stabilization || false;
                    document.getElementById('cfg-system-vision_processing_skip').value = currentConfig.system.vision_processing_skip || 2;
                }
                if (currentConfig.mqtt) {
                    document.getElementById('cfg-mqtt-broker').value = currentConfig.mqtt.broker || "";
                }
                if (!currentConfig.servos) return;
                let servoHtml = '';
                const legs = [
                    { id: 'leg_fl', name: 'Vorne Links' },
                    { id: 'leg_fr', name: 'Vorne Rechts' },
                    { id: 'leg_rl', name: 'Hinten Links' },
                    { id: 'leg_rr', name: 'Hinten Rechts' }
                ];
                const joints = [
                    { id: 'coxa', name: 'Huefte (Seitlich)' },
                    { id: 'femur', name: 'Oberschenkel (Hoehe)' },
                    { id: 'tibia', name: 'Unterschenkel (Knie)' }
                ];
                legs.forEach(leg => {
                    if (currentConfig.servos[leg.id]) {
                        servoHtml += '<h3>' + leg.name + ' Bein</h3><div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">';
                        joints.forEach(joint => {
                            if (currentConfig.servos[leg.id][joint.id]) {
                                const val = currentConfig.servos[leg.id][joint.id].middle;
                                const path = 'servos.' + leg.id + '.' + joint.id + '.middle';
                                servoHtml += '<div class="setting-item" style="margin-bottom: 0;">' +
                                    '<label style="font-size: 0.8rem;">' + joint.name + ' Offset (' + val + '°)</label>' +
                                    '<input type="range" min="45" max="135" value="' + val + '" ' +
                                    'oninput="this.previousElementSibling.innerText = \'' + joint.name + ' Offset (\' + this.value + \'°)\'; updateQuickConfig(\'' + path + '\', parseInt(this.value))">' +
                                '</div>';
                            }
                        });
                        servoHtml += '</div>';
                    }
                });
                if (currentConfig.servos.camera && currentConfig.servos.camera.tilt) {
                    const camTilt = currentConfig.servos.camera.tilt.middle;
                    servoHtml += '<h3>Kamera</h3><div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">' +
                        '<div class="setting-item" style="margin-bottom: 0;">' +
                            '<label style="font-size: 0.8rem;">Neigung / Tilt (' + camTilt + '°)</label>' +
                            '<input type="range" min="45" max="135" value="' + camTilt + '" ' +
                            'oninput="this.previousElementSibling.innerText = \'Neigung / Tilt (\' + this.value + \'°)\'; updateQuickConfig(\'servos.camera.tilt.middle\', parseInt(this.value))">' +
                        '</div>' +
                    '</div>';
                }
                document.getElementById('servo-list').innerHTML = servoHtml;
            } catch (err) { console.error('Config load error:', err); }
        }
        async function updateQuickConfig(key, value) {
            const data = {};
            data[key] = value;
            await fetch('/api/config/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        }
        async function saveAllSettings() {
            const data = { "mqtt.broker": document.getElementById('cfg-mqtt-broker').value };
            await fetch('/api/config/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            alert("Einstellungen gespeichert!");
        }
        function sendCommand(cmd) { fetch('/api/command/' + cmd, { method: 'POST' }); }
        function stopCommand() { fetch('/api/command/stop', { method: 'POST' }); }
        function changeGait(gait) { fetch('/api/gait/' + gait, { method: 'POST' }); }
        function changePose(pose) { fetch('/api/pose/' + pose, { method: 'POST' }); }
        function changeMode(mode) { fetch('/api/mode/' + mode, { method: 'POST' }); }
    </script>
</body>
</html>
